# GitHub Actions workflow: run the pytest suite on every push and pull request to main.

name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run pytest (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create config files
        run: |
          cp ./configs/blizz_conf_example.py ./configs/blizz_conf.py 
          cp ./config/discord_conf_example.py ./configs/discord_conf.py 
          cp ./configs/redis_conf_example.py ./configs/redis_conf.py
      
      - name: Install dependencies
        run: pip3 install -r requirements.txt

      - name: Run tests
        run: python3 -m pytest tests/ -v
